<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Catcher</title>
</head>
<body>
<div id="wr">

    <div id="sm" class="sc on">
        <div class="gtit">Catcher</div>
        <p class="gsub">Catch good things, dodge bad things</p>
        <button class="gbtn" id="sb">▶ Start Game</button>
        <div class="hi-line">Best: <span id="hv">0</span></div>
        <div class="leg">
            <span class="li">🟡 +10</span>
            <span class="li">⭐ +50</span>
            <span class="li">💣 −1 life</span>
        </div>
    </div>

    <div id="sg" class="sc">
        <div id="hud">
            <div>Score: <span class="hs" id="sv">0</span></div>
            <div id="lv"></div>
            <div class="hud-best">Best <span id="hh">0</span></div>
        </div>
        <canvas id="gc" width="800" height="450"></canvas>
    </div>

    <div id="sgo" class="sc">
        <div class="go-title">Game Over</div>
        <div class="srow">
            <div class="scd"><div class="lb">Score</div><div class="vl" id="fs">0</div></div>
            <div class="scd"><div class="lb">Best</div><div class="vl orange" id="fh">0</div></div>
        </div>
        <div class="brow">
            <button class="gbtn" id="rb">Play Again</button>
            <button class="gbtn sec" id="mb">Menu</button>
        </div>
    </div>

</div>
</body>
</html>
